services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: directus
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  directus:
    image: directus/directus:latest
    env_file:
      - .env
    ports:
      - "8055:8055"
    depends_on:
      postgres:
        condition: service_started
    environment:
      SECRET: "latronspem-fiestalok"
      DB_CLIENT: "pg"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_DATABASE: "directus"
      DB_USER: "directus"
      DB_PASSWORD: "directus_dev_password"
      ADMIN_EMAIL: "contact@fiestalok.fr"
      ADMIN_PASSWORD: "fiestalok2sxb!"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "https://fiestalok.fr,http://localhost:5174"
      PUBLIC_URL: "https://back.fiestalok.fr"
    volumes:
      - ./uploads:/directus/uploads
      - ./extensions:/directus/extensions

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    ports:
      - "3000:3000"

  template-renderer:
    build: ./template-renderer
    environment:
      - RENDERER_API_KEY=${RENDERER_API_KEY}
      - SERVICE_URL=http://template-renderer:3001
      - GOTENBERG_URL=http://gotenberg:3000
      - DIRECTUS_URL=http://directus:8055
      - DIRECTUS_TOKEN=${DIRECTUS_TOKEN}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - MAIL_REDIRECT_TO=${MAIL_REDIRECT_TO}
    volumes:
      - ./template-renderer/templates:/app/templates
    restart: unless-stopped

volumes:
  postgres_data:
