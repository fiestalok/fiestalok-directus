services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - directus

  directus:
    image: directus/directus:latest
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started
    environment:
      SECRET: "latronspem-fiestalok"
      DB_CLIENT: "pg"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_EMAIL: "contact@fiestalok.fr"
      ADMIN_PASSWORD: "fiestalok2sxb!"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "https://fiestalok.fr,http://localhost:5174"
      PUBLIC_URL: "https://back.fiestalok.fr"
    volumes:
      - ./uploads:/directus/uploads
      - ./extensions:/directus/extensions

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped

  template-renderer:
    build: ./template-renderer
    environment:
      - RENDERER_API_KEY=${RENDERER_API_KEY}
      - SERVICE_URL=http://template-renderer:3001
      - GOTENBERG_URL=http://gotenberg:3000
      - DIRECTUS_URL=http://directus:8055
      - DIRECTUS_TOKEN=${DIRECTUS_TOKEN}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    volumes:
      - ./template-renderer/templates:/app/templates
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
